workflows:
  android-phonebook:
    name: CIDEV Phonebook - Android
    max_build_duration: 30
    instance_type: linux_x2
    environment:
      node: latest
      groups: []
    scripts:
      - name: Install npm dependencies
        script: npm install
      - name: Add Android platform (first run only)
        script: |
          if [ ! -d "android" ]; then
            npx cap add android
          fi
      - name: Generate app icons from assets/
        script: npm run icons
      - name: Sync web assets into Android project
        script: npx cap sync android
      - name: Build debug APK
        script: |
          cd android
          ./gradlew assembleDebug
    artifacts:
      - android/app/build/outputs/**/*.apk
