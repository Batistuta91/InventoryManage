workflows:
  android-debug-apk:
    name: InventoryManage - Android Debug APK
    max_build_duration: 30
    instance_type: mac_mini_m2
    environment:
      vars:
        PACKAGE_NAME: "com.cidev.inventorymanage"
      java: 17
    scripts:
      - name: Build debug APK
        script: |
          ./gradlew assembleDebug
    artifacts:
      - app/build/outputs/apk/**/*.apk
      - app/build/outputs/**/mapping.txt
