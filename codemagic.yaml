workflows:
  android-debug-apk:
    name: Date Code Decoder - Android APK
    max_build_duration: 30
    instance_type: mac_mini_m2
    environment:
      node: 20
      vars:
        PACKAGE_NAME: "com.cidev.datecodedecoder"
    scripts:
      - name: Install npm dependencies
        script: |
          npm install
      - name: Sync Capacitor (copy web assets into android project)
        script: |
          npx cap sync android
      - name: Build Android debug APK
        script: |
          cd android
          chmod +x ./gradlew
          ./gradlew assembleDebug
    artifacts:
      - android/app/build/outputs/apk/debug/*.apk
    publishing:
      email:
        recipients:
          - your-email@example.com
        notify:
          success: true
          failure: true
